name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths-ignore:
      - "distr/YTMusic Smart Downloader.exe"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          sparse-checkout: |
            /.github
            /.gitignore
            /assets
            /core
            /gui
            /distr/windows
            /distr/YTMusic Smart Downloader.exe
            /main.py
            /README.md
            /requirements.txt
            /setup_app.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        shell: powershell
        run: choco install ffmpeg --no-progress -y

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: powershell
        run: .\distr\windows\build_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytmusic-smart-downloader-windows
          path: distr/YTMusic Smart Downloader.exe

      - name: Commit executable
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --sparse "distr/YTMusic Smart Downloader.exe"
          if git diff --cached --quiet; then
            echo "No executable changes to commit."
            exit 0
          fi
          git commit -m "Add Windows executable [skip ci]"
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
